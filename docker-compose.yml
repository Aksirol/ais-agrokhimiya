services:
  db:
    image: postgres:15-alpine
    container_name: agro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agro_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agro_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agro_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ЗМІННІ ПЕРЕНЕСЕНО СЮДИ:
      # Зверни увагу: бекенд підключається до бази всередині Docker-мережі за адресою db:5432
      DATABASE_URL: "postgresql://postgres:agro_password@db:5432/agro_db?schema=public"
      JWT_SECRET: "super_secret_jwt_key_agro_2024"
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: agro_frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data: