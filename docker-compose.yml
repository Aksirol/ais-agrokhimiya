version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: agro_backend
    restart: always
    depends_on:
      - db
    # Вказуємо шлях до нашого файлу з секретами
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: agro_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

# Обов'язковий блок, який випадково видалився (реєстрація тому)
volumes:
  postgres_data: