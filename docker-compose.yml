version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # НОВЕ: Вчимо Docker перевіряти, чи база дійсно завантажилася
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agro_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agro_backend
    restart: always
    depends_on:
      db:
        # НОВЕ: Бекенд чекатиме, поки база не стане повністю "здоровою" (готовою)
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: agro_frontend
    restart: always
    depends_on:
      backend:
        # Фронтенд чекатиме на успішний запуск бекенду
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data: