
services:
  db:
    image: postgres:15-alpine
    container_name: agro_db
    restart: always
    environment:
      # Пароль бази даних краще теж винести, але для локальної розробки залишимо поки так
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: agro_backend
    restart: always
    depends_on:
      - db
    environment:
      # ЗМІНЕНО: Тепер Docker бере ці значення з файлу .env, який лежить на комп'ютері
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    ports:
      - "5000:5000"

# ... (інше залишається без змін)